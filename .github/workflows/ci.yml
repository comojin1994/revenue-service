name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install yt-dlp (runtime system dependency)
        run: |
          python3 -m pip install --user --upgrade yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify yt-dlp
        run: yt-dlp --version

      - name: Install ffmpeg (runtime system dependency)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
